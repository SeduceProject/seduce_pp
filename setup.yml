---
- hosts: 127.0.0.1
  become: yes # This means that all tasks will be executed with sudo
  tasks:
    - name: Install Python 3.6
      apt:
        name: python3.6
        state: present
        update_cache: yes
    - name: Install pip
      apt:
        name: python3-pip
        state: present
        update_cache: yes
    - name: Install mariadb
      apt:
        name: mariadb-server
        state: present
        update_cache: yes
    - name: Install dnsmasq
      apt:
        name: dnsmasq
        state: present
        update_cache: yes
    - name: Create a "/tftpboot" directory
      file:
        path: /tftpboot
        state: directory
    - name: Configure dnsmasq
      blockinfile:
        path: /etc/dnsmasq.conf
        block: |
          port=0
          dhcp-range=192.168.1.255,proxy
          log-dhcp
          enable-tftp
          tftp-root=/tftpboot
          pxe-service=0,"Raspberry Pi Boot"
          dhcp-reply-delay=1
          tftp-no-blocksize
    - name: Restart dnsmasq
      service:
        name: dnsmasq
        state: restarted
    - name: Install a nfs server
      apt:
        name: nfs-kernel-server
        state: present
        update_cache: yes
    - name: Create a "/nfs/raspi1" directory
      file:
        path: /nfs/raspi1
        state: directory
    - name: Configure nfs export
      blockinfile:
        path: /etc/exports
        block: |
          # /etc/exports: the access control list for filesystems which may be exported
          #		to NFS clients.  See exports(5).
          #
          # Example for NFSv2 and NFSv3:
          # /srv/homes       hostname1(rw,sync,no_subtree_check) hostname2(ro,sync,no_subtree_check)
          #
          # Example for NFSv4:
          # /srv/nfs4        gss/krb5i(rw,sync,fsid=0,crossmnt,no_subtree_check)
          # /srv/nfs4/homes  gss/krb5i(rw,sync,no_subtree_check)
          #
          /nfs/raspi1 *(rw,sync,no_subtree_check,no_root_squash)
    - name: Restart the nfs server
      service:
        name: nfs-kernel-server
        state: restarted
